version: '3.8'

services:
  # API REST (production)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prediction-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - API_WORKERS=4
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dashboard Streamlit (optionnel)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: prediction-dashboard
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    restart: unless-stopped
    depends_on:
      - api

  # Nginx (reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: prediction-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl  # Pour certificats SSL
    restart: unless-stopped
    depends_on:
      - api
      - dashboard
